name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
    - name: Build distribution
      run: uv build
    - name: File list
      run: tar tf dist/*.tar.gz && unzip -l dist/*.whl
    - name: Check distribution metadata
      run: uvx twine check --strict dist/*
    - name: Upload artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: dist
        path: dist/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
    - name: flake8
      run: uv run flake8 src tests
    - name: black
      run: uv run black --check src tests
    - name: isort
      run: uv run isort --check-only src tests
    - name: mypy
      run: uv run mypy src

  test:
    name: Run tests
    needs: build
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Download artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
    - name: Install wheel
      shell: bash
      run: pip install dist/*.whl
    - name: Install test requirements
      run: pip install pytest
    - name: Test
      run: pytest

  pypi-publish-test:
    name: Release on Test PyPI
    needs: [test, lint]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: Test PyPI
      url: "https://test.pypi.org/project/verify-oidc-token/"
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: "https://test.pypi.org/legacy/"

  github-release:
    name: Release on GitHub
    needs: [test, lint]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: GitHub
      url: "https://github.com/ei-grad/verify-oidc-token/releases/"
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Extract Version from Tag
        run: echo "VERSION_FROM_GIT_REF=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      - name: Extract Version from pyproject.toml
        run: |
          pip install toml
          VERSION_FROM_PYPROJECT=$(python << EOF
          import toml
          print(toml.load('pyproject.toml')['project']['version'])
          EOF
          )
          echo "VERSION_FROM_PYPROJECT=$VERSION_FROM_PYPROJECT" >> $GITHUB_ENV
      - name: Ensure version consistency
        run: |
          if [ "$VERSION_FROM_GIT_REF" != "$VERSION_FROM_PYPROJECT" ]; then
            echo "Error: Version from tag ($VERSION_FROM_GIT_REF) does not match version in pyproject.toml ($VERSION_FROM_PYPROJECT)"
            exit 1
          fi
          echo VERSION=$VERSION_FROM_GIT_REF >> $GITHUB_ENV
      - name: Extract changelog for release notes
        run: |
          (
            echo "CHANGELOG<<EOF"
            awk -v version="$VERSION" '{
                if ($0 ~ "^## \\[" version "\\]") inSection = 1;
                else if ($0 ~ "^## \\[" && inSection) inSection = 0;
                if (inSection) print $0;
            }' CHANGELOG.md
            echo "EOF"
          ) >> $GITHUB_ENV
      - name: Validate changelog content
        run: |
          if [ -z "$CHANGELOG" ] ; then
            echo "Missing CHANGELOG.md section for release $VERSION"
            exit 1
          fi
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --notes "$CHANGELOG"
      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "$GITHUB_REF_NAME" dist/**

  pypi-publish:
    name: Release on PyPI
    needs: github-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: PyPI
      url: "https://pypi.org/project/verify-oidc-token/"
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
